# 통일 디자인 시스템 — 디자인 토큰
#
# 참조 덱: "A'DREN Brand Deck_final_26.07.01.pdf" (제작: alternative nine)
# design-system-extract 스킬이 위 덱을 분석해 아래 값을 추출했습니다.
# 색상은 실제 슬라이드에서 픽셀 샘플링한 값입니다.
# 이 값이 claude-design-brief.md 로 반영됩니다.

brand:
  name: "alternative nine"          # 덱의 디자인 언어(제작사) / 사례: A'DREN
  logo: "assets/logo.png"           # 우상단 박스형 워드마크
  wordmark: "alternative nine"      # 좌하단 소형 워드마크(모든 슬라이드)
  tagline: ""

# 톤: 흑백 모노크롬 에디토리얼. 넉넉한 여백, 한 슬라이드 한 메시지.
# 강조는 골드 1색만 소량. 장식 최소화.

colors:
  ink:        "#131313"   # 제목/본문 기본 (거의 검정)
  ink_bg:     "#0D0D0D"   # 섹션 구분(다크) 슬라이드 배경
  background: "#FFFFFF"   # 기본 슬라이드 배경
  accent:     "#C29A3D"   # 골드 — 강조 전용(아이브로우/핵심 1줄/하이라이트 카드)
  cream:      "#FAF5E7"   # 하이라이트 카드 배경(골드의 연한 톤)
  text:       "#131313"   # 본문 텍스트
  muted:      "#6A6A6A"   # 아이브로우/부제/캡션/페이지번호
  muted_light: "#848484"  # 보조 본문(다크 배경 위 본문 포함)
  hairline:   "#E5E5E5"   # 얇은 구분선
  rule_strong: "#131313"  # 컬럼 상단 굵은 구분선

  # 그레이스케일 단계 (계단형 바/누적 그래픽에 사용)
  grayscale: ["#111111", "#333333", "#555555", "#777777", "#999999"]

  # 다이어그램 전용 뮤트 파스텔 (벤 다이어그램 등, 저채도만 사용)
  diagram:
    green:      "#A6C3B4"
    blue:       "#9AB8D5"
    pale_blue:  "#CFDFED"

typography:
  # 한글 본문/제목은 Pretendard. 영문 디스플레이는 헤비 그로테스크
  # (참조 덱은 굵은 산세리프 디스플레이 사용 — 대체로 Pretendard/Archivo 계열).
  heading_font: "Pretendard"
  body_font:    "Pretendard"
  display_latin_font: "Archivo"   # 영문 대형 헤드라인(대안: Pretendard 900)
  mono_font:    "JetBrains Mono"
  # pt 기준 (캔버스 960x540pt = 표준 16:9 PowerPoint와 동일 좌표)
  sizes:
    display: 64     # 섹션 구분 슬라이드의 대형 영문 단어(FOUNDATION 등)
    title: 40       # 표지 제목
    section: 28     # 본문 슬라이드 제목
    statement: 30   # 중앙 정렬 선언/명제
    heading: 20     # 카드/컬럼 소제목
    body: 15        # 본문
    eyebrow: 11     # 아이브로우(대문자·자간 넓게)
    caption: 10     # 캡션/푸터/페이지번호
  weights:
    display: 800    # 영문 디스플레이/표지 제목 = 매우 굵게
    title: 700
    heading: 700
    body: 400
    eyebrow: 700    # 굵게 + 대문자 + letter-spacing
  tracking:
    eyebrow_em: 0.14   # 아이브로우 자간(대문자)
    display_em: -0.01  # 대형 헤드라인 살짝 좁게

layout:
  aspect_ratio: "16:9"
  canvas_pt: { width: 960, height: 540 }
  margins_pt: { top: 44, right: 56, bottom: 40, left: 56 }
  grid_columns: 12
  gutter_pt: 16
  card_radius_pt: 12       # 카드/이미지 모서리 라운드
  footer:
    wordmark: { position: "bottom-left", color: "muted", size: 10, weight: 700 }
    page_number: { position: "bottom-right", color: "muted", size: 10 }

# 지원 슬라이드 레이아웃 (content_model.LayoutHint 와 매칭)
layouts:
  - title            # 표지: 우상단 로고박스 + 좌하단 대형 제목 + 회색 영문 부제
  - section          # 섹션 구분: 다크 배경 + 대형 영문 단어 + 회색 부제/설명
  - content          # 아이브로우 + 굵은 제목 + 리드문 + 본문
  - statement        # 상단 2줄 헤더 + 풀폭 구분선 + 중앙 대형 명제(스택)
  - quote            # 중앙 1줄 볼드 이탤릭 인용
  - highlight_cards  # 균등 컬럼, 활성 컬럼만 cream 배경 + 골드 제목(순차 강조)
  - compare_columns  # 컬럼별 굵은 상단선 + 볼드 소제목 + 회색 본문
  - image_cards      # 라운드 사진 카드 + 회색 아이브로우 + 볼드 제목
  - image_full       # 전면 이미지 + 좌하단 아이브로우/흰 볼드 제목 오버레이
  - diagram          # 뮤트 파스텔 도형 + 다크 라벨

rules:
  - "색은 위 팔레트만 사용. 골드(#C29A3D)는 강조 전용으로 슬라이드당 최소한만."
  - "모든 본문 슬라이드: 좌하단 워드마크, 우하단 페이지번호(회색 10pt)."
  - "아이브로우는 대문자 + 굵게 + 자간 넓게, muted 회색."
  - "제목/디스플레이는 매우 굵게, 본문은 regular. 위계는 굵기·크기로만."
  - "다크 섹션 슬라이드는 #0D0D0D 배경 + 흰 대형 영문 + 회색 부제."
  - "여백을 넉넉히, 한 슬라이드 한 메시지. 그림자/그라데이션 지양."
  - "이미지·카드는 12pt 라운드, 원본 비율 유지."
  - "다이어그램은 저채도 파스텔(sage/blue)만 사용."
